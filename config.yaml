# MOAT CHAIN (Part 9 failover): PRIMARY brains first, then a GUARDRAILED cheap tail.
#   gemini_cli, claude_cli  = TRUSTED moat (rule kills/passes normally).
#   deepseek, minimax       = EMERGENCY FALLBACK — engaged by the circuit breaker ONLY
#                             when BOTH gemini AND claude are exhausted. A verdict ruled
#                             by a fallback brain marks the dossier `provisional`: it does
#                             NOT publish on PASS and is auto re-vetted by the moat on the
#                             next `vet --resume` (see verify.py MOAT_PRIMARY). This keeps
#                             throughput up during a quota outage without trusting a
#                             cheap model's ruling as final.
# PROMOTION GATE (to make a cheap model a TRUSTED primary, not just a fallback): see
# specs/offline-moat-validation.md and run, recording a clearance:
#   python -m prospector.golden --operator deepseek --fixtures fixtures/golden_fixtures.json --runs 3
operator: [gemini, gemini_cli, deepseek, minimax]   # gemini API first (fast, trusted primary),
                                 # gemini_cli fallback (OAuth quota),
                                 # deepseek/minimax emergency fallback.
                                 # Single string still works: `operator: gemini_cli`.
model: "gemini-2.5-flash"          # verdict brain (Gemini, fast + grounded).
model_fast: "deepseek-v4-flash"  # cheap model for query-gen/prescreen
model_version_tag: ""            # filled at runtime for audit

# --- Model defaults (Part: HARDCODED_MODEL_AUDIT_TICKET) ---
# Per-provider default model identifiers. Used as FALLBACK when model:/model_fast:
# are empty or unset for a given provider context.
model_defaults:
  gemini:       "gemini-2.5-flash"      # GeminiOperator default
  claude:       "claude-sonnet-4-5"     # ClaudeOperator default
  deepseek:     "deepseek-v4-pro"       # DeepSeekOperator default
  minimax:      "MiniMax-M3"           # MiniMaxOperator (fast=False)
  minimax_fast: "MiniMax-M2.7"         # MiniMaxOperator (fast=True)
  ollama:       "qwen2.5-coder:7b"     # OllamaOperator default
  search:
    deepseek:    "deepseek-v4-flash"
    minimax:     "MiniMax-M3"

retrieval:
  # Full resilience grounding chain — working providers first:
  #   1. exa            — real web search via Exa API (1,000-20,000/mo free; needs EXA_API_KEY)
  #   2. brave          — real web search via Brave API (2,000/mo free; needs BRAVE_API_KEY)
  #   3. gemini_cli     — real web search via Google CLI (20/day free; exhausts fast)
  #   4. claude_cli     — real web search via Claude CLI (credit-based; claude-3-5-sonnet)
  #
  # NOTE: deepseek/minimax_search/openrouter were REMOVED — they are LLM-synthesis
  # providers, NOT real search engines. Without a Brave API key they return hallucinated
  # URLs that _resolve() drops, causing every check to return "unverifiable".
  # Options: exa | brave | gemini_cli | claude_cli | gemini_grounding | fixture
  provider: [exa, brave, gemini_cli, claude_cli]
  queries_per_check: 0              # 0 = skip LLM query-gen entirely; use template only (kill-fast path)
  results_per_query: 1             # 1 source per query; kill-fast short-circuits anyway
  max_passage_chars: 1500
  cache: true
  # All six gates use deterministic disconfirming-query templates (_DISCONFIRM_TEMPLATES in
  # verify.py) — eliminates the LLM query-gen call entirely. Query generation is a lookup,
  # not judgment, so it belongs in code; the model is reserved for ruling on fetched passages.
  template_checks: [pain_reality, value_durability, incumbency, payer_solvency, distribution, legality]
  fast_queries: 1                # query count per templated check (latency saver on the 80%-kill path)
  search_model: "gemini-2.5-flash"  # SEARCH/grounding model — mid-tier for recall (flash-lite returns
                                 # 0 sources for many queries). Verdict ruling still uses `model` (-lite).

  # --- Resilience layer (Part 9). All knobs live here — no hardcoded values in code. ---
  search_timeout: 75             # base seconds per web-search (attempt 0)
  search_timeout_max: 150        # adaptive ceiling: the timeout escalates per retry up to this
  search_timeout_escalation: 1.5 # slow≠dead — give each retry more headroom before giving up
  search_retries: 1              # in-place retries before failing over to the next provider
  claude_min_timeout: 120        # claude grounding floor (its search runs slower than gemini's)
  queue_timeout: 45              # max wait for a free provider slot before failing over (bounds
                                 # total latency at queue_timeout + search_timeout; was UNBOUNDED)
  gemini_concurrency: 2          # max concurrent gemini CLI subprocesses (heavy node processes)
  claude_concurrency: 2          # max concurrent claude CLI subprocesses
  vet_workers: 1                 # 1 candidate at a time — reduces concurrent DeepSeek grounding load
                                 # workers no longer oversubscribe 2+2 slots and self-induce timeouts
  breaker_failure_threshold: 3   # CONSECUTIVE transient fails before a provider is retired (one
                                 # timeout under load no longer permanently dead-lists it)
  breaker_cooldown_s: 60         # seconds a retired provider stays out before a half-open recovery probe

thresholds:
  # confidence_floor: a grounded killing verdict only HARD-kills when its deterministic
  # grounding confidence clears this floor; below it the candidate falls through to
  # scoring (not killed at the gate). The tunable lever for the value_durability
  # over-restriction wall (war-room 2026-06-15). 0.0 = inert/golden-safe; CALIBRATE the
  # real value by re-running the 6 known good/bad controls live under supervision before
  # raising it (mock confidence ~0.4 flat is NOT the live scale). See P0-2 in
  # docs/PIPELINE_REVIEW_2026-06-18.md.
  confidence_floor: 0.0
  min_composite_to_pass: 3.2

hard_gates:                      # Part 4 kill-filter; evaluated kill-fast in this order
  # A KILL must be grounded in CITED disconfirming evidence (refuted), never in
  # silence. `unverifiable` = "no matching passage" = no evidence to kill on, so it
  # must NOT be a killing verdict (doing so killed on silence and, under kill-fast,
  # let value_durability execute ~every candidate before any other gate ran).
  # See CLAUDE.md: "A KILL is not the model's opinion; it is grounded in evidence."
  # The killing verdict depends on the check's QUESTION FRAMING (models.py CHECKS):
  # All checks are instructed via verdict.md to use POSITIVE polarity:
  # "supported" = PASS (space is open, legal, durable, solvent)
  # "refuted"   = KILL (incumbent exists, illegal, obsolete, broke)
  # This unified polarity ensures all hard gates kill on `refuted`.
  # legality was historically `[refuted]`, which inverted it: it killed LEGAL ideas
  # (verdict refuted = "no, it doesn't break the law") and let genuinely unlawful ones
  # through. A creative-but-LAWFUL workaround (exploiting a legitimate statutory
  # mechanism) must SURVIVE; only a margin that requires actually breaking law/terms or
  # falsifying data is a kill — hence legality kills on `supported`.
  - value_durability: [refuted]
  - incumbency: [refuted]
  - payer_solvency: [refuted]
  - distribution: [refuted]
  - legality: [refuted]

  - pain_reality: [refuted]
  - adversarial_decisive: true

weights:
  pain_acuity: 0.20
  money_provability: 0.20
  automatability: 0.20
  distribution: 0.15
  defensibility: 0.15
  build_feasibility: 0.10

# ---- Ambition lanes (Part 14) ----
# The engine caters to the FULL spectrum of ideas — from £30 side-hustles to unicorn-
# potential ventures — by judging each candidate against the bar appropriate to its OWN
# ambition class, NOT one universal filter (think an Amazon catalogue: list anything, but
# each item is graded by its own class). The cross-lane invariant that never moves is
# source-or-die grounding; only WHICH claims must hold (the gate roles + thresholds) swaps.
# A lane overrides hard_gates / thresholds / weights; the top-level blocks above are the
# implicit default. `active_lane: ""` => default => byte-for-byte today's venture behaviour.
# MULTI-LANE BY DEFAULT: the catalogue is mixed-ambition (a buyer seeking a side hustle and a
# buyer wanting to launch a startup browse the SAME catalogue, each item graded by its own
# class). One run fans generation out across `active_lanes`, auto-classifies each idea into its
# natural tier, then vets each against THAT tier's bar. `active_lane` (singular) still pins a
# single lane and overrides active_lanes; empty active_lanes => single-default (venture) run.
active_lane: ""
active_lanes: [side_hustle, smb, growth, venture]
lane_quota:                        # candidates generated per tier per multi-lane run
  side_hustle: 4
  smb: 3
  growth: 3
  venture: 3
lanes:
  venture:                         # unicorn-ambition: the durable-moat bar (= current default)
    hard_gates:
      - value_durability: [refuted]
      - incumbency: [refuted]
      - payer_solvency: [refuted]
      - distribution: [refuted]
      - legality: [refuted]
      - pain_reality: [refuted]
      - adversarial_decisive: true
    thresholds:
      confidence_floor: 0.0   # calibrate live under supervision before raising (see thresholds note)
      min_composite_to_pass: 3.2
  side_hustle:                     # £30-pack lane: judge DEMAND + DELIVERABILITY, not moat.
    # Commoditised, high-intent niches are GOOD here (lots of searchers/payers = the buyer),
    # so value_durability/incumbency are OFF. The real moat filter is the Stage-7 CAC test.
    hard_gates:                    # kill-fast: cheapest decisive demand signal first
      - buyer_intent: [refuted]    # nobody searching/paying => dead
      - currency: [refuted]        # stale/peaked trend => dead
      - route_to_market: [refuted] # no beginner-followable channel => dead
      - legality: [refuted]
      # margin requires genuine illegality => dead
      # adversarial stays DECISIVE, but lane-aware (see adversarial_directive): it must NOT
      # kill on "no moat / commoditised" (the wrong objection for a £30 pack — commoditised
      # = buyers exist), yet it MUST still kill on grounded DELIVERABILITY/DEMAND failure
      # (method doesn't work, channel dead, no demand, already free). Turning it fully off
      # let through a dishonest PASS whose own dossier refuted it.
      - adversarial_decisive: true
    # Re-frames the adversarial pass for the £30-pack bar: commoditisation is fine; kill
    # only on grounded evidence the thing won't deliver or sell. (Empty for venture.)
    adversarial_directive: >
      This candidate is a £30 INFO-PRODUCT PACK, not a venture. Commoditisation, absence
      of a moat or defensibility, low switching cost, or the fact that 'anyone could
      assemble this themselves' are NOT valid kill reasons here — buyers pay £30 for
      convenience, curation and a method they can follow. You may mark the case 'decisive'
      ONLY on grounded evidence of a DELIVERABILITY or DEMAND failure: practitioners report
      the method does not actually work as sold; the route/channel is closed, banned or
      being deprecated; there is no real buyer demand; or the promised outcome is already
      available FREE in a form buyers will use instead. Never mark 'decisive' for mere lack
      of a moat, novelty, or defensibility.
    score_checks:                  # run + score, never kill (soft signal for the composite)
      # claims_verifiable is SOFT here: its disconfirm query ("false OR contradicted")
      # structurally surfaces a negative for any niche, so it kills demand-real ideas on
      # "the space got more competitive" — a quality signal, not a kill criterion.
      - claims_verifiable
      - payer_solvency
      - distribution
      - pain_reality
    thresholds:
      confidence_floor: 0.0   # calibrate live under supervision before raising (see thresholds note)
      min_composite_to_pass: 2.0   # lower bar: a £30 pack is not a venture
    # Lane-aware GENERATION: merged over the top-level `generation:` block (for_lane).
    # Re-aims generation at side-hustle-SCALE OPPORTUNITIES (the kind of opportunity), NOT
    # at "£30 packs" (the £30 pack is the downstream SELLING FORMAT, applied to every tier —
    # see listing/packs; it is NOT this lane's idea space). Decoupling these two axes is the
    # core correction: tier = scale of the opportunity; packaging = how we sell it.
    generation:
      # lane_directive is injected at the top of generate_system.md and OVERRIDES the
      # venture moat language that follows. Empty for venture => prompt unchanged.
      lane_directive: >
        LANE OVERRIDE — IGNORE every durable-moat / wedge / defensibility / "kills ~80%"
        requirement stated anywhere below: it DOES NOT APPLY to this run. Generate
        SIDE-HUSTLE-SCALE OPPORTUNITIES: a specific thing ONE solo person can start with
        little capital, for supplemental or income-replacing earnings. Judge an idea ONLY on:
        (1) DEMAND — are real people actively searching for or already paying for this RIGHT
        NOW; (2) DELIVERABILITY — can a beginner follow an OPEN route to the promised outcome;
        (3) CURRENCY — is it live now, not a peaked fad. Commoditised, crowded, "anyone could
        do it" niches are GOOD here (crowds = buyers). Each idea must name a SPECIFIC, concrete
        opportunity (the exact niche + the exact thing sold/done) — never a platform,
        marketplace, registry, or venture. Span DIVERSE forms; do NOT collapse to one format.
        Favour sharp, non-obvious opportunities over the tired top-10 side hustles.
      # Side-hustle-SCALE opportunity forms (what the solo operator actually DOES/sells) —
      # NOT "£30 pack" deliverable formats. The £30 pack packages any of these for sale.
      structural_forms:
        - local_service          # a hands-on local service one person can deliver
        - micro_ecommerce        # a small niche product store (print-on-demand, dropship, handmade)
        - productized_freelance  # a freelance skill sold as a fixed-scope, repeatable product
        - content_channel        # a monetised audience in a specific niche (ads/sponsor/affiliate)
        - niche_micro_saas       # a tiny single-workflow tool for one underserved niche
        - marketplace_seller     # selling into an existing marketplace's built-in demand
        - rental_arbitrage       # renting/reselling an asset or access for a spread
        - info_product           # a course/templates/kit teaching one valuable skill
  smb:                             # small-business lane: a real 1–20-staff business that throws
    # off genuine owner income. Bar above side_hustle: demand is not enough — the PAYER must be
    # solvent and there must be a real route to customers (both HARD). A deep moat is still NOT
    # required (commoditised-but-profitable small businesses are fine); the kill is no real
    # business / broken unit economics, surfaced by the adversarial pass.
    hard_gates:                    # kill-fast: cheapest decisive signal first
      - buyer_intent: [refuted]    # nobody searching/paying => dead
      - payer_solvency: [refuted]  # payer has no budget/motive => no business
      - distribution: [refuted]    # no real route to the customer => dead
      - legality: [refuted]
      # margin requires genuine illegality => dead
      - adversarial_decisive: true
    adversarial_directive: >
      This candidate is a SMALL BUSINESS (roughly 1–20 staff) meant to throw off real owner
      income, NOT a venture-scale company. Commoditisation, absence of a durable moat, low
      switching cost, or 'anyone could compete' are NOT valid kill reasons — plenty of
      profitable small businesses are commoditised. You may mark the case 'decisive' ONLY on
      grounded evidence of a real-business failure: the unit economics cannot clear a living
      owner income (costs/CAC exceed achievable margin), there is no reachable paying customer
      base, the route to customers is closed/banned, or the demand is not real. Never mark
      'decisive' merely for lack of a moat, novelty, or defensibility.
    score_checks:                  # run + score, never kill
      - pain_reality
      - currency
      - route_to_market
      - claims_verifiable
    thresholds:
      confidence_floor: 0.0   # calibrate live under supervision before raising (see thresholds note)
      min_composite_to_pass: 2.6   # above side_hustle (2.0), below growth/venture
    generation:
      lane_directive: >
        LANE OVERRIDE — IGNORE every durable-moat / wedge / defensibility / "kills ~80%"
        requirement below: it DOES NOT APPLY here. Generate SMALL-BUSINESS OPPORTUNITIES — a
        venture one founder (optionally a tiny team) can build into a real business of roughly
        1–20 people that pays a genuine owner income. Judge an idea ONLY on: (1) DEMAND — real
        people/firms actively paying for this now; (2) VIABLE UNIT ECONOMICS — a believable
        margin after delivery cost and customer acquisition; (3) A REAL ROUTE TO CUSTOMERS a
        small operator can actually work. A durable moat is NOT required — commoditised but
        profitable is fine. Name a SPECIFIC, concrete business (who it serves + what it sells),
        never a platform, marketplace, registry, or venture-scale play. Span DIVERSE forms.
      structural_forms:
        - productized_service    # a done-for-you outcome sold as a repeatable product
        - local_service_chain    # a hands-on service that can grow past one operator
        - vertical_tool          # narrow software for one workflow in one niche
        - b2b_service            # an ongoing service sold to other small businesses
        - ecommerce_brand        # a niche product brand with repeat purchase
        - specialist_agency      # a focused agency owning one specific deliverable
        - niche_distribution     # sourcing/reselling into an underserved channel
        - equipment_or_rental    # an asset-backed service or rental operation
  growth:                          # growth-startup lane: venture-track, must show a REPEATABLE,
    # scalable growth motion (a channel that compounds + retention), but NOT yet a deep moat.
    # Bar above smb: acute pain is now HARD. The kill is no scalable channel / no retention.
    hard_gates:
      - pain_reality: [refuted]    # no acute, real pain => no growth engine
      - payer_solvency: [refuted]
      - distribution: [refuted]    # no scalable route => not a growth business
      - legality: [refuted]
      - adversarial_decisive: true
    adversarial_directive: >
      This candidate is a GROWTH-STAGE STARTUP that must show a REPEATABLE, SCALABLE growth
      motion — but a deep durable moat is NOT yet required (early growth companies often lack
      one). Do NOT kill merely for absence of a moat or defensibility. You may mark the case
      'decisive' ONLY on grounded evidence that growth cannot compound: there is no scalable,
      repeatable acquisition channel (only manual/unscalable selling), or no plausible
      retention (one-shot demand, churn that kills the motion), or the acute pain is not real.
    score_checks:
      - value_durability
      - incumbency
      - currency
      - buyer_intent
      - claims_verifiable
    thresholds:
      confidence_floor: 0.0   # calibrate live under supervision before raising (see thresholds note)
      min_composite_to_pass: 2.9   # above smb (2.6), just below venture (3.2)
    generation:
      lane_directive: >
        LANE OVERRIDE — a deep durable moat is NOT required for THIS run; do not demand one.
        Generate GROWTH-STARTUP OPPORTUNITIES — ventures that can grow fast via a REPEATABLE,
        SCALABLE motion. Judge an idea on: (1) ACUTE PAIN a defined segment feels now; (2) a
        SOLVENT, MOTIVATED PAYER; (3) a SCALABLE, REPEATABLE acquisition CHANNEL (self-serve,
        a forcing function, an existing high-volume channel) — not manual one-off selling;
        (4) plausible RETENTION (the need recurs / the product compounds). A deep moat can come
        later. Name a SPECIFIC, concrete startup (segment + product + growth motion). Span
        DIVERSE forms; do NOT collapse to one shape.
      structural_forms:
        - vertical_saas          # software for one industry's core workflow, self-serve growth
        - plg_tool               # a product-led tool with built-in viral/self-serve acquisition
        - transactional_platform # takes a cut of a transaction it uniquely originates/de-risks
        - prosumer_tool          # a tool for prosumers/creators with bottoms-up adoption
        - api_product            # an API/infra product developers adopt and embed
        - data_workflow          # a compounding-data product that improves with usage
        - marketplace_thin       # a focused marketplace seeding one liquid niche first
        - vertical_service_scaled # a service productised toward a scalable delivery model

generation:
  candidates_per_signal: 5
  max_per_call: 10      # max ideas requested per LLM call; generation batches to reach k
  max_rounds: 6         # max batching rounds to hit the requested candidate count
  operator_archetype: solo_agent
  refinement_enabled: true # ML Improvement: enable the cynical analyst critique pass
  # ORTHOGONALITY AXIS (Part 3 redesign). Generation mode-collapsed: the ONLY diversity
  # axis was the creativity LENS, which varies the ANGLE of attack but not the BUSINESS
  # FORM — so every lens on a regulatory signal converged on the same "central data /
  # rating / registry utility" shape (6 ideas from 2 unrelated signals were one idea).
  # We now fan out across distinct STRUCTURAL FORMS: each parallel call must build its
  # idea in a DIFFERENT business form, so the dead reference-data shape is at most ONE
  # cell of many — collapse broken by construction, not by another prompt adjective.
  structural_forms:
    - productized_service   # a done-for-you OUTCOME sold as a product; human labour is the wedge, automated down over time
    - vertical_tool         # narrow software for ONE workflow in ONE niche; switching-cost moat once embedded
    - transaction_broker    # take a cut of a transaction you uniquely ORIGINATE or de-risk (not a generic marketplace)
    - risk_financing        # take the OTHER SIDE of a cashflow/risk others won't underwrite; price an asymmetry you can read
    - physical_ops          # an atoms+bits operation a laptop rival cannot ship; logistics/inspection/on-the-ground presence
    - audience_media        # build a SPECIFIC audience's trust first, then monetise the attention/access you own
    - picks_and_shovels     # sell the inputs/tooling to everyone chasing the same gold rush, not the gold
    - data_intelligence     # proprietary COMPOUNDING data rivals structurally cannot obtain (the one form that may be a data play)
  # Audience persona axis — varies the BUYER independently of the business form.
  # Together with structural_forms this creates an 8×8 = 64-cell diversity matrix,
  # breaking the B2B-institutional monoculture that drives the value_durability wall.
  audience_forms:
    - retiree_cohort          # 60+ with capital, time, health anxiety; asset-rich, income-poor
    - gen_z_worker            # 18-27, gig economy, digital native, low savings, job-hopping
    - smb_owner               # 1-20 employee business owner; wears every hat, cash-flow stressed
    - primary_carer           # parents of young children or guardians of elderly relatives
    - manual_tradesperson     # construction, logistics, hospitality; hands-on, time-poor, digitally underserved
    - public_sector_worker    # nurses, teachers, civil servants; fixed pay, predictable needs
    - freelancer_creative     # designers, writers, consultants; income volatile, client-dependent
    - squeezed_middle         # 35-55, dual-income, asset-rich on paper, cash-poor month-to-month
  archetypes:
    solo_agent:
      binding: "SOLO AGENT-OPERATOR (binding — an idea failing these is INVALID, do not propose it): distribution must be OWNED or FREE (you cannot buy reach or out-spend anyone); the whole thing must be BUILDABLE and OPERABLE by ONE AI-leveraged person with no team, no outside capital, no licence; the moat must be one a solo can actually hold (proprietary process/data/taste/judgment, a captive niche, or switching cost) — never one that needs scale, headcount, or capital."
      forbid: "FORBIDDEN SHAPES (a solo structurally CANNOT be these — proposing one is an automatic miss): a licensed/accredited rating agency, a central registry/index/authority, a regulator or standards body, a bank/insurer/DFI underwriting at scale, a two-sided marketplace whose liquidity you must buy, or anything that only works once you are already a large incumbent with an existing book."
  controller:
    killrate_window: 50
    exploration_min: 0.2
    exploration_max: 0.9
    lenses: [broaden, narrow, analogical, first_principles, invert, combine_signals, cross_sector]
    target_qualities: [acute_pain, solvent_motivated_payer, durable_hard_core, real_distribution, clean_legality, high_automatability]

# Generation PROFILES (Part 16 — targeted steering). A profile is a reusable bundle of
# `generation` overrides selectable with `--profile NAME` (or config `active_profile`). It
# biases WHAT KIND of ideas are generated — it NEVER touches gates, thresholds or the moat,
# so it cannot manufacture a pass. A profile composes over any --lane (its forms/focus win).
# The `focus` string is injected into the generate prompt as a binding TARGETING CONSTRAINT;
# `--focus "..."` at the CLI overrides it for one-off experiments.
profiles:
  online_autonomous_predator:
    generation:
      # Hard floor: "no human in the loop" is a GUARANTEE here, not a preference. Candidates
      # whose self-reported automatability is below this (or unstated) are dropped at
      # generation time, before the moat ever sees them. Generation-only — never a verdict gate.
      automatability_floor: 0.8
      # Restrict to ONLINE / software-deliverable forms — drop physical_ops (atoms) and
      # productized_service / risk_financing (human-labour or capital-heavy, not "no human
      # in the loop"). These five can all run as automated online businesses.
      structural_forms:
        - vertical_tool         # narrow automated software for ONE niche workflow
        - transaction_broker    # take a cut of a transaction you uniquely originate/de-risk, online
        - data_intelligence     # proprietary compounding data, sold as an automated feed/API
        - audience_media        # owned audience monetised via automated digital products/access
        - picks_and_shovels     # automated tooling sold to everyone chasing one online gold rush
      focus: >
        ONLINE-NATIVE, FULLY-AUTOMATED business only. It must (1) operate entirely ONLINE —
        no physical premises, inventory, logistics, or local in-person service; (2) run with
        NO HUMAN IN THE LOOP for delivery — the value is produced and delivered by software/AI
        on autopilot, not by the operator's manual labour per customer; (3) attack an ACUTE,
        bleeding-neck pain a specific buyer feels NOW and will pay to stop today — predatory
        instinct: go where the pain is sharpest and the alternative is doing nothing; and
        (4) make money DIRECTLY ONLINE — self-serve signup and online payment, no sales calls,
        no invoicing, no human onboarding. Reject anything requiring per-customer human work,
        offline fulfilment, or a long manual sales cycle.

# Personas (Part 16 — analytical multi-tenancy). A persona provides analytical bias/voice
# for generation, verdict, and adversarial. It "tints" the entire pipeline.
# active_persona: "" (default)
active_persona: ""
personas:
  shark:
    generation_bias: >
      You are Kevin O'Leary. You care ONLY about massive margins, unassailable moats,
      and scale. If an idea is 'too small' or 'too easy to copy', don't even propose it.
      Search for the 'unfair advantage' in every signal. Reject anything that feels like
      a hobby or a tiny niche without a path to a $100M exit.
    verdict_bias: >
      Be ruthlessly skeptical. If the evidence doesn't prove a massive, recurring pain
      and a clear ability to capture value, mark it REFUTED. Don't be 'nice'. Look for
      the hidden commodity trap.
    adversarial_bias: >
      Your job is to find the one reason this company will go bankrupt. Is there a giant
      already doing this? Is the CAC higher than the LTV? Is the margin being eaten by
      incumbents? Kill it if you can.
    thresholds:
      min_composite_to_pass: 3.8
  minimalist:
    generation_bias: >
      You are a solopreneur. You want zero employees, 90% automation, and high cashflow.
      Avoid complex operations, physical inventory, or long sales cycles. Focus on 'boring'
      but profitable niches that can be run from a laptop.
    verdict_bias: >
      Focus on deliverability. Can ONE person actually run this using AI? If it requires
      a team, a physical presence, or a complex license, it's REFUTED for this persona.
    adversarial_bias: >
      Find the operational trap. Where will the founder get stuck doing manual labor?
      If it's not truly autonomous or if it has 'people risk', kill it.
    thresholds:
      min_composite_to_pass: 3.2
  academic:
    generation_bias: >
      You are a research scientist. Look for deep technical breakthroughs, regulatory
      shifts rooted in data, and first-principles optimizations. Avoid marketing fluff
      and 'growth hacks'. Focus on structural changes in science and law.
    verdict_bias: >
      Require high-fidelity evidence. Is there a peer-reviewed study? Is there a primary
      legal source? If the citations are 'blog posts' but not 'sources of truth',
      downgrade the confidence.
    adversarial_bias: >
      Identify the logical flaw. Is the hypothesis grounded in sound physics/economics/law?
      If the reasoning is weak or based on a misunderstanding of the technical signal,
      it's dead.
    thresholds:
      min_composite_to_pass: 3.4

