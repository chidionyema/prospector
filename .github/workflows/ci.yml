name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  DOTNET_VERSION: "9.0"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Python — full test suite + golden-set hard gate
  # ──────────────────────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      # Install from requirements.txt (there is no pyproject.toml, so `uv sync`
      # cannot be used). --system installs into the setup-python interpreter.
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Main test suite (excluding UI theme)
        run: python -m pytest -q --ignore=tests/test_ui_theme.py --tb=short -x -p no:warnings

      # ── Hard gate ──────────────────────────────────────────────
      # Block the pipeline if the golden set does not achieve 100 %
      # discrimination.  Every config change or prompt edit must
      # maintain perfect regression coverage on the 9 fixtures.
      - name: Golden-set regression gate ⛔
        run: python -m pytest tests/test_golden_set.py -v --tb=short
      # ────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────
  # .NET — Store tests
  # ──────────────────────────────────────────────────────────────────
  dotnet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/Store.Tests/

      - name: Build
        run: dotnet build src/Store.Tests/ --no-restore

      - name: Test
        run: dotnet test src/Store.Tests/ --no-build --verbosity normal

  # ──────────────────────────────────────────────────────────────────
  # Next.js — build check on store platform
  # ──────────────────────────────────────────────────────────────────
  nextjs:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: store_platform/src/Store.Web/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
